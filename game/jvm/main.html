<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Destroyer</title>
    <link rel="stylesheet" href="style.css">
    <script src="events.js" defer></script>
    <script src="upgrades.js" defer></script>
    <script src="monsters.js" defer></script>
        <script src="boss/boss1.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="menu-screen">
            <h1 id="start-title">SYSTEM BOOT</h1>
            <p id="start-desc">初始化中...</p>
            
            <select id="lang-selector" class="lang-dropdown">
                <option value="java">Java (JVM)</option>
                <option value="python">Python (Interpreter)</option>
                <option value="cpp">C/C++ (Compiler)</option>
            </select>

            <button id="begin-btn" class="action-btn">execute()</button>
        </div>
        <div id="level-up-screen" class="menu-screen">
            <h1 id="level-up-title">优化方案选择</h1>
            <div class="upgrade-cards" id="upgrade-container"></div>
        </div>
        <div id="top-ui">
            <div id="xp-bar-container"><div id="xp-bar"></div></div>
            <div id="stats-layer">
                <div class="board">Level: <span id="level-display">1</span></div>
                <div class="board">已拦截: <span id="score">0</span></div>
                <div class="board">系统负载剩余: <span id="lives">100/100</span></div>
                <div class="board">护盾: <span id="shield-display">0/0</span></div>
                <div class="board">下一次事件: <span id="event-timer">20.0</span>s</div>
                <button id="pause-btn" class="board-btn">暂停 (ESC)</button>
            </div>
        </div>
        <div id="execution-zone">[成功执行区域] 危险：允许代码越界将增加系统负载</div>
        <div id="player">JVM</div>
        <div id="game-over-screen" class="menu-screen">
            <h1 id="game-over-title">OUT OF MEMORY</h1>
            <p id="game-over-desc">系统负载过高，核心崩溃。</p>
            <p>达到等级: Level <span id="final-level">1</span></p>
            <p>最终拦截代码量: <span id="final-score">0</span></p>
            <button id="restart-btn" class="action-btn">reboot()</button>
        </div>
        <div id="pause-screen" class="menu-screen" style="display: none;">
            <h1 style="color: var(--primary-color); text-shadow: 0 0 15px var(--primary-color);">PAUSED</h1>
            <div id="pause-stats" style="text-align: left; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; border: 1px solid var(--primary-color); margin-bottom: 20px; min-width: 300px; color: var(--text-color); font-size: 14px; line-height: 1.5;"></div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button id="resume-btn" class="action-btn">继续 (Continue)</button>
                <button id="retry-btn" class="action-btn">重试 (Retry)</button>
                <button id="menu-btn" class="action-btn">主界面 (Main)</button>
            </div>
        </div>
        <div id="cheat-menu" class="menu-screen" style="display: none; background: rgba(0,0,0,0.95); z-index: 2000;">
            <h1 style="color: #ff00ff; text-shadow: 0 0 15px #ff00ff; margin-bottom: 20px;">Dev Tools</h1>
            
            <div id="cheat-main-menu" class="cheat-page">
                <button class="action-btn" onclick="showCheatPage('cheat-boss-menu')">Spawn Boss</button>
                <button class="action-btn" onclick="showCheatPage('cheat-mob-menu')">Spawn Mobs</button>
                <button class="action-btn" onclick="showCheatPage('cheat-event-menu')">Trigger Event</button>
                <button class="action-btn" onclick="showCheatPage('cheat-upg-menu')">Obtain Upgrades</button>
                <button class="action-btn" onclick="showCheatPage('cheat-stat-menu')">Edit Stats</button>
                <button class="action-btn" onclick="document.getElementById('cheat-menu').style.display='none'" style="border-color: #ff4d4d; color: #ff4d4d;">Close</button>
            </div>

            <div id="cheat-boss-menu" class="cheat-page" style="display:none;">
                <button class="action-btn" onclick="if(!activeBoss) { boss1Spawned = true; spawnBoss1(); document.getElementById('cheat-menu').style.display='none'; }">Boss 1</button>
                <button class="action-btn" onclick="showCheatPage('cheat-main-menu')">Back</button>
            </div>

            <div id="cheat-mob-menu" class="cheat-page" style="display:none; max-width: 800px;">
                <div class="cheat-grid">
                    <button class="action-btn" onclick="spawnDevMob(0)">Normal</button>
                    <button class="action-btn" onclick="spawnDevMob(1)">Tank</button>
                    <button class="action-btn" onclick="spawnDevMob(2)">Fast</button>
                    <button class="action-btn" onclick="spawnDevMob(3)">Tracker</button>
                    <button class="action-btn" onclick="spawnDevMob(4)">Shooter</button>
                    <button class="action-btn" onclick="spawnDevMob(5)">Dasher</button>
                    <button class="action-btn" onclick="spawnDevMob(6)">Spawner</button>
                    <button class="action-btn" onclick="spawnDevMob(7)">Wobbler</button>
                    <button class="action-btn" onclick="spawnDevMob(8)">Side Basic</button>
                    <button class="action-btn" onclick="spawnDevMob(9)">Side Sniper</button>
                    <button class="action-btn" onclick="spawnDevMob(10)">GC Heal</button>
                    <button class="action-btn" onclick="spawnDevMob(11)">GC Slow</button>
                </div>
                <button class="action-btn" style="margin-top: 15px;" onclick="showCheatPage('cheat-main-menu')">Back</button>
            </div>

            <div id="cheat-event-menu" class="cheat-page" style="display:none;">
                <div class="cheat-grid">
                    <button class="action-btn" onclick="triggerEventA(); document.getElementById('cheat-menu').style.display='none'">Event A (Fast Rush)</button>
                    <button class="action-btn" onclick="triggerEventB(); document.getElementById('cheat-menu').style.display='none'">Event B (Tank Wall)</button>
                    <button class="action-btn" onclick="triggerEventC(); document.getElementById('cheat-menu').style.display='none'">Event C (Right Sniper)</button>
                    <button class="action-btn" onclick="triggerEventD(); document.getElementById('cheat-menu').style.display='none'">Event D (Left Sniper)</button>
                    <button class="action-btn" onclick="triggerEventE(); document.getElementById('cheat-menu').style.display='none'">Event E (Tanks Fall)</button>
                    <button class="action-btn" onclick="triggerEventF(); document.getElementById('cheat-menu').style.display='none'">Event F (Spawners)</button>
                </div>
                <button class="action-btn" style="margin-top: 15px;" onclick="showCheatPage('cheat-main-menu')">Back</button>
            </div>

            <div id="cheat-upg-menu" class="cheat-page" style="display:none; flex-direction: column; align-items: center;">
                <div id="cheat-upg-grid" class="cheat-grid" style="max-height: 400px; overflow-y: auto; padding: 10px;"></div>
                <button class="action-btn" style="margin-top: 15px;" onclick="showCheatPage('cheat-main-menu')">Back</button>
            </div>

            <div id="cheat-stat-menu" class="cheat-page" style="display:none; flex-direction: column;">
                <div class="cheat-grid">
                    <div class="cheat-input-group"><label>Level</label><input type="number" id="cs-level"></div>
                    <div class="cheat-input-group"><label>Damage</label><input type="number" id="cs-damage"></div>
                    <div class="cheat-input-group"><label>Max Lives</label><input type="number" id="cs-maxlives"></div>
                    <div class="cheat-input-group"><label>Max Shield</label><input type="number" id="cs-maxshield"></div>
                    <div class="cheat-input-group"><label>Crit Rate</label><input type="number" step="0.1" id="cs-crit"></div>
                    <div class="cheat-input-group"><label>Bullet Spd</label><input type="number" id="cs-spd"></div>
                </div>
                <div style="display:flex; gap:10px; margin-top: 20px; justify-content: center;">
                    <button class="action-btn" onclick="applyCheatStats()">Apply</button>
                    <button class="action-btn" onclick="showCheatPage('cheat-main-menu')">Back</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
