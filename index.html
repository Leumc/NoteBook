<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Pages 部署测试</title>
    <style>
        /* 简单的内联 CSS，用来测试样式是否生效 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        .success-icon {
            font-size: 72px;
            color: #27ae60;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
        }
        .info {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            padding: 15px;
            text-align: left;
            margin-top: 30px;
            border-radius: 4px;
        }
        code {
            background-color: #eee;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <h1>恭喜！你的 Cloudflare Pages 部署成功！</h1>
        <p>如果你能看到这个页面，说明你的 GitHub 仓库已经成功连接到 Cloudflare，并且网页已经全球分发。</p>
        
        <div class="info">
            <p><strong>测试信息：</strong></p>
            <ul>
                <li>这是一个静态 HTML 页面。</li>
                <li>CSS 样式（内联）已正常加载。</li>
                <li>此页面<strong>没有备案</strong>，服务器在海外。</li>
            </ul>
        </div>
        
        <p style="margin-top: 30px; font-size: 14px; color: #888;">
            来自你的大一 C++/Python 学习助手
        </p>
    </div>
</body>
</html>
