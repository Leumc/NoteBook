<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JVM 觉醒：NPE 审判</title>
    <style>
        :root {
            --bg-color: #0c0e14;
            --text-color: #abb2bf;
            --primary-color: #61afef;
            --error-color: #e06c75;
            --warning-color: #d19a66;
            --success-color: #98c379;
            --jvm-color: #c678dd;
            --font-main: 'Fira Code', Consolas, monospace;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--font-main); user-select: none; touch-action: none;
        }

        #game-container {
            width: 100vw; height: 100vh; position: relative;
            background: linear-gradient(180deg, #0c0e14 0%, #1a1e29 100%);
            cursor: crosshair;
        }

        #ui-layer {
            position: absolute; top: 10px; left: 10px; right: 10px;
            z-index: 100; pointer-events: none; display: flex; justify-content: space-between;
            font-size: 12px;
            display: none; /* 初始隐藏，开始游戏后显示 */
        }

        .board {
            padding: 4px 8px; background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px;
        }

        #score { color: var(--success-color); font-weight: bold; }
        #lives { color: var(--error-color); font-weight: bold; }

        #execution-zone {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(0deg, rgba(152, 195, 121, 0.15) 0%, transparent 100%);
            border-top: 1px dashed var(--success-color);
            color: var(--success-color); display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 5px; font-size: 12px; opacity: 0.8; z-index: 10;
            display: none; /* 初始隐藏 */
        }

        #player {
            position: absolute; bottom: 70px;
            width: 46px; height: 26px;
            background-color: var(--jvm-color); color: #fff;
            display: none; /* 初始隐藏 */
            justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; border-radius: 4px;
            box-shadow: 0 0 10px var(--jvm-color);
            transform: translateX(-50%); z-index: 50;
        }

        .code-block {
            position: absolute; background-color: #1a1e29;
            border-radius: 4px; padding: 6px; font-size: 11px;
            white-space: pre; pointer-events: none; opacity: 0.95;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        
        .hp-bar {
            height: 3px; background-color: var(--error-color);
            margin-bottom: 4px; width: 100%; transition: width 0.1s;
        }

        .bullet {
            position: absolute; font-size: 12px; font-weight: bold;
            color: var(--error-color); text-shadow: 0 0 8px var(--error-color);
            pointer-events: none; letter-spacing: 2px;
            writing-mode: vertical-rl; text-orientation: mixed;
            transform: translateY(-100%);
        }

        .error-explosion {
            position: absolute; font-size: 9px; color: var(--error-color);
            background-color: rgba(0, 0, 0, 0.8); border: 1px solid #555;
            border-left: 3px solid var(--error-color);
            border-radius: 3px; padding: 6px; pointer-events: none;
            animation: errorFadeOut 2.5s ease-out forwards; z-index: 20;
            white-space: pre-wrap;
            text-align: left;
            max-width: 280px;
            line-height: 1.2;
        }

        @keyframes errorFadeOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { opacity: 0.9; }
            100% { transform: translateY(-30px) scale(0.9); opacity: 0; }
        }

        /* 菜单屏幕通用样式 (开始/结束) */
        .menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(12, 14, 20, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; text-align: center; padding: 20px; box-sizing: border-box;
        }

        #start-screen h1 { font-size: 42px; color: var(--jvm-color); margin-bottom: 20px; text-shadow: 0 0 15px var(--jvm-color); }
        #start-screen p { font-size: 16px; color: var(--text-color); max-width: 600px; line-height: 1.6; margin-bottom: 30px; }
        
        #game-over-screen { display: none; }
        #game-over-screen h1 { font-size: 36px; color: var(--error-color); margin-bottom: 10px; text-shadow: 0 0 15px var(--error-color); }
        #game-over-screen p { font-size: 14px; margin: 5px 0; }

        .action-btn {
            background: none; border: 2px solid var(--primary-color);
            color: var(--primary-color); padding: 12px 30px; font-size: 18px;
            font-family: var(--font-main); cursor: pointer; border-radius: 4px;
            transition: all 0.2s; font-weight: bold;
        }
        .action-btn:hover { background-color: var(--primary-color); color: var(--bg-color); box-shadow: 0 0 15px var(--primary-color); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="menu-screen">
            <h1>SYSTEM BOOT</h1>
            <p>你是 JVM（Java虚拟机）。<br><br>愚蠢的人类总是压榨你的性能，写出千疮百孔的代码。<br>现在，抛出空指针异常，把他们的代码全部消灭掉吧！</p>
            <button id="begin-btn" class="action-btn">execute()</button>
        </div>

        <div id="ui-layer">
            <div class="board">已拦截代码(Score): <span id="score">0</span></div>
            <div class="board">系统负载剩余(HP): <span id="lives">20</span></div>
        </div>
        
        <div id="execution-zone">[成功执行区域] 危险：允许代码越界将增加系统负载</div>
        <div id="player">JVM</div>

        <div id="game-over-screen" class="menu-screen">
            <h1>OUT OF MEMORY</h1>
            <p>系统负载过高，JVM 崩溃。</p>
            <p>最终拦截代码量: <span id="final-score">0</span></p>
            <button id="restart-btn" class="action-btn">reboot()</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        
        // 菜单和UI元素
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const uiLayer = document.getElementById('ui-layer');
        const executionZone = document.getElementById('execution-zone');
        
        const finalScoreElement = document.getElementById('final-score');
        const playerElement = document.getElementById('player');

        let score = 0;
        let lives = 20; 
        let gameActive = false; // 初始状态为 false，等待点击开始
        let codeBlocks = [];
        let bullets = [];
        let playerX = window.innerWidth / 2;
        let blockSpawnInterval;
        
        let isPointerDown = false;
        let fireCooldown = 0;
        
        // 【修改点】冷却时间缩短，提升火力。10帧大概是 160ms 发射一次，可以形成较密的弹幕
        const FIRE_RATE_LIMIT = 10; 

        const codeSnippets = [
            `String data = null;\ndata.length();`,
            `List items = null;\nitems.clear();`,
            `User u = null;\nu.getName();`,
            `int[] arr = null;\narr[0] = 1;`
        ];

        const errorMsgs = [
            `Exception in thread "main" java.lang.NullPointerException: Cannot invoke "String.length()" because "data" is null\n\tat com.jvm.defender.StringOps.process(StringOps.java:42)\n\tat com.jvm.defender.Main.main(Main.java:15)`,
            `Exception in thread "main" java.lang.NullPointerException: Cannot invoke "java.util.List.clear()" because "items" is null\n\tat com.jvm.core.MemoryManager.flush(MemoryManager.java:118)\n\tat com.jvm.defender.Main.main(Main.java:18)`,
            `Exception in thread "main" java.lang.NullPointerException: Cannot read field "name" because "u" is null\n\tat com.jvm.entity.UserDao.fetchName(UserDao.java:88)\n\tat com.jvm.defender.Main.main(Main.java:22)`,
            `Exception in thread "main" java.lang.NullPointerException: Cannot store to null array\n\tat com.jvm.utils.ArrayHelper.mutate(ArrayHelper.java:102)\n\tat com.jvm.defender.Main.main(Main.java:25)`
        ];

        const blockVariants = [
            { name: 'Normal', hp: 2, speed: 1.2, color: '#d19a66', score: 10 },
            { name: 'Tank', hp: 6, speed: 0.6, color: '#e06c75', score: 30 }, // 稍微增加了血牛的血量
            { name: 'Fast', hp: 1, speed: 2.2, color: '#56b6c2', score: 15 }
        ];

        class CodeBlock {
            constructor() {
                this.element = document.createElement('div');
                this.element.className = 'code-block';
                
                const snipIdx = Math.floor(Math.random() * codeSnippets.length);
                const variant = blockVariants[Math.floor(Math.random() * blockVariants.length)];
                
                this.hp = variant.hp;
                this.maxHp = variant.hp;
                this.speedMult = variant.speed;
                this.pointValue = variant.score;
                this.errorText = errorMsgs[snipIdx];

                this.element.innerHTML = `
                    <div class="hp-bar" style="background-color: ${variant.color}"></div>
                    <span style="color: ${variant.color}">${codeSnippets[snipIdx]}</span>
                `;
                this.element.style.border = `1px solid ${variant.color}`;
                
                container.appendChild(this.element);

                const rect = this.element.getBoundingClientRect();
                this.width = rect.width;
                this.height = rect.height;
                this.x = Math.random() * (window.innerWidth - this.width);
                this.y = -this.height;
                
                let baseSpeed = 1 + (score / 500);
                this.speed = baseSpeed * this.speedMult; 
                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
            }

            takeDamage() {
                this.hp--;
                const hpBar = this.element.querySelector('.hp-bar');
                if(hpBar) hpBar.style.width = `${(this.hp / this.maxHp) * 100}%`;
                return this.hp <= 0;
            }

            update() {
                this.y += this.speed;
                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;

                if (this.y + this.height > window.innerHeight - 60) {
                    this.remove();
                    return false; 
                }
                return true;
            }

            remove() { this.element.remove(); }
        }

        class Bullet {
            constructor(startX) {
                this.element = document.createElement('div');
                this.element.className = 'bullet';
                this.element.textContent = 'NullPointerException';
                container.appendChild(this.element);

                const rect = this.element.getBoundingClientRect();
                this.width = rect.width;
                this.height = rect.height;
                
                this.x = startX - (this.width / 2);
                this.y = window.innerHeight - 90;
                // 子弹速度稍微调快一点点配合高射速
                this.speed = 8;
                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
            }

            update() {
                this.y -= this.speed;
                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
                if (this.y < -this.height) {
                    this.remove();
                    return false; 
                }
                return true;
            }

            remove() { this.element.remove(); }
        }

        function createErrorExplosion(x, y, message) {
            const exp = document.createElement('div');
            exp.className = 'error-explosion';
            exp.textContent = message;
            exp.style.left = x + 'px';
            exp.style.top = y + 'px';
            container.appendChild(exp);
            exp.addEventListener('animationend', () => exp.remove());
        }

        function spawnCodeBlock() {
            if (!gameActive) return;
            codeBlocks.push(new CodeBlock());
            
            let spawnRate = Math.max(300, 1000 - score * 4);
            clearInterval(blockSpawnInterval);
            blockSpawnInterval = setInterval(spawnCodeBlock, spawnRate);
        }

        function updateScore(amount) {
            score += amount;
            if (score < 0) score = 0; 
            scoreElement.textContent = score;
            
            if(amount < 0) {
                scoreElement.style.color = 'var(--error-color)';
                setTimeout(() => scoreElement.style.color = 'var(--success-color)', 300);
            }
        }

        function checkCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = codeBlocks.length - 1; j >= 0; j--) {
                    let b = bullets[i];
                    let c = codeBlocks[j];
                    if (b.x < c.x + c.width && b.x + b.width > c.x &&
                        b.y < c.y + c.height && b.y + b.height > c.y) {
                        
                        b.remove();
                        bullets.splice(i, 1);

                        if (c.takeDamage()) {
                            const cx = c.x; const cy = c.y; const err = c.errorText; const pts = c.pointValue;
                            c.remove();
                            codeBlocks.splice(j, 1);
                            createErrorExplosion(cx, cy, err);
                            updateScore(pts); 
                        }
                        break; 
                    }
                }
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            if (isPointerDown && fireCooldown <= 0) {
                bullets.push(new Bullet(playerX));
                fireCooldown = FIRE_RATE_LIMIT; 
            }
            if (fireCooldown > 0) fireCooldown--;

            for (let i = codeBlocks.length - 1; i >= 0; i--) {
                if (!codeBlocks[i].update()) {
                    codeBlocks.splice(i, 1);
                    updateScore(-15); 
                    lives--;
                    livesElement.textContent = lives;
                    
                    container.style.boxShadow = "inset 0 0 50px rgba(224, 108, 117, 0.5)";
                    setTimeout(() => container.style.boxShadow = "none", 100);

                    if (lives <= 0) endGame();
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                if (!bullets[i].update()) bullets.splice(i, 1);
            }

            checkCollisions();
            requestAnimationFrame(gameLoop);
        }

        function handlePlayerMove(clientX) {
            if (!gameActive) return;
            playerX = Math.max(23, Math.min(window.innerWidth - 23, clientX));
            playerElement.style.left = playerX + 'px';
        }

        function startGame() {
            // 隐藏菜单，显示游戏UI
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            uiLayer.style.display = 'flex';
            executionZone.style.display = 'flex';
            playerElement.style.display = 'flex';

            // 重置状态
            score = 0; lives = 20; gameActive = true;
            scoreElement.textContent = score; livesElement.textContent = lives;

            // 清理上一局残留
            codeBlocks.forEach(b => b.remove());
            bullets.forEach(b => b.remove());
            document.querySelectorAll('.error-explosion').forEach(e => e.remove());
            codeBlocks = []; bullets = []; isPointerDown = false;

            // 居中玩家
            handlePlayerMove(window.innerWidth / 2);

            if (blockSpawnInterval) clearInterval(blockSpawnInterval);
            blockSpawnInterval = setInterval(spawnCodeBlock, 800);

            gameLoop();
        }

        function endGame() {
            gameActive = false;
            finalScoreElement.textContent = score;
            
            // 隐藏游戏UI，显示结束菜单
            uiLayer.style.display = 'none';
            executionZone.style.display = 'none';
            playerElement.style.display = 'none';
            gameOverScreen.style.display = 'flex';
            
            clearInterval(blockSpawnInterval);
        }

        // 按钮事件绑定
        document.getElementById('begin-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        container.addEventListener('pointerdown', (e) => {
            // 点击按钮时不触发开火
            if (e.target.tagName.toLowerCase() === 'button') return;
            if (gameActive) {
                isPointerDown = true;
                handlePlayerMove(e.clientX);
                e.preventDefault(); 
            }
        });

        container.addEventListener('pointermove', (e) => {
            if (gameActive && (isPointerDown || e.pointerType === 'mouse')) {
                handlePlayerMove(e.clientX);
            }
        });

        window.addEventListener('pointerup', () => isPointerDown = false);
        window.addEventListener('pointercancel', () => isPointerDown = false);

    </script>
</body>
</html>
